<style>											
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }

.system-header { text-align: center; padding: 10px 0; font-weight: bold; color: #333; font-size: 14px; border-bottom: 1px solid #ddd; margin-bottom: 15px; }											
.card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }											
.profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }											
.profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #00B900; }											
.profile-info h2 { margin: 0; font-size: 20px; color: #1a1a1a; }

.points-status { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }

input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; }											
select { background-color: white; cursor: pointer; }											
button { background: #00B900; color: white; border: none; font-weight: bold; cursor: pointer; }											
#loading { text-align: center; padding: 50px 20px; font-size: 18px; color: #666; }											
.two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

<div id="successView" class="card hidden" style="text-align: center;">											
<div style="font-size: 60px;">🎉</div>											
<h2 style="color: #00B900;">แลกรับรางวัลสำเร็จ!</h2>											
<p>กรุณาแสดงหน้าจอนี้ต่อพนักงานเพื่อรับสิทธิ์</p>											
<div style="background: #f8f9fa; padding: 20px; border: 2px dashed #00B900; border-radius: 10px; margin: 20px 0;">											
<span style="font-size: 14px; color: #666;">รหัสรับสิทธิ์ของคุณคือ:</span><br>											
<b id="couponCode" style="font-size: 32px; color: #1a1a1a; letter-spacing: 2px;">-------</b>											
</div>											
<p id="redeemPromoName" style="font-weight: bold;"></p>											
<button onclick="location.reload()" style="background: #666;">กลับหน้าหลัก</button>											
</div>											
											
<script>											
const LIFF_ID = "2009968995-Egq6SGGS";											
const GAS_URL = "https://script.google.com/macros/s/AKfycbzHPiLHLxEpmOfnAepJDC4sm4xaDWXrwU3O_R84l-OeJlMiaQrzg3dKYK9Y925TP63trA/exec";											
											
let userLineUid = "";											
const monthNames = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];											
											
async function main() {											
await liff.init({ liffId: LIFF_ID });											
if (!liff.isLoggedIn()) { liff.login(); }											
else {											
const profile = await liff.getProfile();											
userLineUid = profile.userId;											
											
fetch(GAS_URL + "?action=check&uid=" + userLineUid)											
.then(res => res.json())											
.then(result => {											
document.getElementById('loading').classList.add('hidden');											
if (result.isMember) {											
renderDashboard(profile.pictureUrl, profile.displayName, result.member, result.promos);											
} else {											
document.getElementById('inpName').value = profile.displayName;											
document.getElementById('registerView').classList.remove('hidden');											
}											
});											
}											
}											
											
function renderDashboard(linePic, lineName, memberData, promos) {											
document.getElementById('dashboard').classList.remove('hidden');											
document.getElementById('userPic').src = linePic || "https://via.placeholder.com/80";											
document.getElementById('userName').innerText = lineName;											
document.getElementById('userTier').innerText = memberData.tier || "Member";											
document.getElementById('userMemId').innerText = memberData.memberId;											
document.getElementById('userPhone').innerText = memberData.phone || "-";											
document.getElementById('userEmail').innerText = memberData.email || "-";											
											
const promoDiv = document.getElementById('promoContainer');											
promoDiv.innerHTML = "";											
											
promos.forEach(promo => {											
let myPoints = 0;											
for(let i = promo.startM - 1; i <= promo.endM - 1; i++) {											
myPoints += memberData.points[i] || 0;											
}											
											
let percent = (myPoints / promo.reqPoints) * 100;											
if(percent > 100) percent = 100;											
											
let missing = promo.reqPoints - myPoints;											
											
let statusHtml = "";											
if (missing <= 0) {											
statusHtml = `											
<span class="status-ready">🎉 พร้อมแลกสิทธิ์! (${myPoints}/${promo.reqPoints})</span>											
<button onclick="redeem('${promo.id}', '${promo.name}')" style="margin-top:10px; background:#e74c3c; border-radius:20px; padding:8px;">🎁 กดรับสิทธิ์เลย</button>											
`;											
} else {											
statusHtml = `											
<div style="display:flex; justify-content:space-between; width:100%;">											
<span>สะสมแล้ว ${myPoints}</span><span class="status-missing">ขาดอีก ${missing} แต้ม</span>											
</div>											
`;											
}											
											
let periodText = monthNames[promo.startM - 1] + " - " + monthNames[promo.endM - 1] + (promo.year ? " " + promo.year : "");											
											
const cardHtml = `											
<div class="promo-card">											
${promo.image ? `<img class="promo-img" src="${promo.image}">` : ''}											
<div class="promo-details">											
<h3 class="promo-title">${promo.name}</h3>											
<div class="promo-period">🗓 สะสมช่วง: ${periodText}</div>											
<div class="points-bar-bg"><div class="points-bar-fill" style="width: ${percent}%;"></div></div>											
<div class="points-status" style="flex-direction:column; align-items:flex-start;">											
${statusHtml}											
</div>											
</div>											
</div>`;											
promoDiv.innerHTML += cardHtml;											
});											
											
if(promos.length === 0) promoDiv.innerHTML = "<p style='text-align:center; color:#888;'>ยังไม่มีโปรโมชั่นในขณะนี้</p>";											
}											
											
function redeem(promoId, promoName) {											
if(confirm(`ยืนยันการใช้แต้มเพื่อแลกรับ:\n"${promoName}"\n\n(แต้มจะถูกหักทันทีและไม่สามารถคืนได้)`)) {											
											
document.getElementById('dashboard').classList.add('hidden');											
document.getElementById('loading').classList.remove('hidden');											
document.getElementById('loading').innerHTML = "<h2>กำลังดำเนินการแลกรางวัล... ⏳</h2>";											
											
fetch(GAS_URL + "?action=redeem&uid=" + userLineUid + "&promoId=" + promoId)											
.then(res => res.json())											
.then(async result => {											
if(result.success) {											
											
const randomCode = result.couponCode; // ดึงคูปองจาก GAS มาโชว์											
											
try {											
if (liff.isInClient()) {											
await liff.sendMessages([{											
type: "text",											
text: "🎁 [แจ้งแลกรับสิทธิ์]\nรหัสสมาชิก: " + result.updatedData.member.memberId +											
\nขอแลก:  + promoName +											
\nรหัสคูปอง:  + randomCode +											
\n\n(แต้มถูกหักในระบบเรียบร้อยแล้ว)											
}]);											
}											
} catch (msgError) {											
console.log("ส่งข้อความไม่ได้: ", msgError);											
}											
											
document.getElementById('loading').classList.add('hidden');											
document.getElementById('successView').classList.remove('hidden');											
document.getElementById('couponCode').innerText = randomCode;											
document.getElementById('redeemPromoName').innerText = promoName;											
											
} else {											
alert("ขออภัย: " + result.message);											
location.reload();											
}											
})											
.catch(err => {											
console.error(err);											
alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");											
location.reload();											
});											
}											
}											
											
function submitForm() {											
const provinceSelect = document.getElementById('inpProvince');											
if(provinceSelect.value === "") {											
alert("กรุณาเลือกจังหวัด");											
provinceSelect.focus();											
return;											
}											
											
document.getElementById('registerView').classList.add('hidden');											
document.getElementById('loading').classList.remove('hidden');											
											
const url = GAS_URL + "?action=register&uid=" + userLineUid +											
&name= + encodeURIComponent(document.getElementById('inpName').value) +											
&phone= + encodeURIComponent(document.getElementById('inpPhone').value) +											
&email= + encodeURIComponent(document.getElementById('inpEmail').value) +											
&dob= + encodeURIComponent(document.getElementById('inpDob').value) +											
&country= + encodeURIComponent(document.getElementById('inpCountry').value) +											
&address= + encodeURIComponent(document.getElementById('inpAddress').value) +											
&province= + encodeURIComponent(document.getElementById('inpProvince').value) +											
&zipcode= + encodeURIComponent(document.getElementById('inpZip').value);											
											
fetch(url)											
.then(res => res.json())											
.then(result => {											
document.getElementById('loading').classList.add('hidden');											
liff.getProfile().then(profile => {											
renderDashboard(profile.pictureUrl, profile.displayName, result.member, result.promos);											
});											
});											
}											
											
main();											
</script>											
</body>											
</html>
